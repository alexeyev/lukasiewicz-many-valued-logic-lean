# Łukasiewicz / MV-algebra formalization in pure Lean 4 core (no Mathlib).
#
# The MV-algebra theory is organized as a dependency-ordered module chain under
# `Lukasiewicz/` (Base → … → Instances). Importing the `Lukasiewicz` library
# root builds the whole chain. Because the modules import one another, there is
# NO code duplication — each result is proved exactly once.
#
#   lake build                         -- builds the algebra chain
#   lake env lean Lukasiewicz/Soundness.lean   -- check a standalone logic module
#
# The standalone logic modules (Residuation, Soundness, Equivalence, DeductionBL)
# each redeclare the core class so they also compile in isolation with
# `lean <file>` and are intentionally excluded from the library root.
name = "lukasiewicz"
defaultTargets = ["Lukasiewicz"]

[[lean_lib]]
name = "Lukasiewicz"
# Only the algebra chain is globbed into the library; the standalone logic
# modules are checked individually (see above) to avoid class-redeclaration
# clashes with `Base`.
globs = ["Lukasiewicz.Base", "Lukasiewicz.Lattice", "Lukasiewicz.Distance", "Lukasiewicz.BooleanCenter", "Lukasiewicz.MVLemmas", "Lukasiewicz.BooleanAlgebra", "Lukasiewicz.Ideals", "Lukasiewicz.Subalgebras", "Lukasiewicz.IdealOperations", "Lukasiewicz.Instances", "Lukasiewicz.Quotient", "Lukasiewicz.Correspondence", "Lukasiewicz.SecondIso", "Lukasiewicz.CRT", "Lukasiewicz.IsoBasics", "Lukasiewicz.IdealLattice"]
